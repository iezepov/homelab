---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/widgets

- resources:
    cpu: true
    memory: true
    disk: /
    cputemp: true # disabled by default
    uptime: true # disabled by default


- search:
    provider: google
    target: _blank

- datetime:
    text_size: xl
    format:
      timeStyle: short