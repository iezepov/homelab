blueprint:
  homeassistant:
    min_version: 2025.02.01
  author: Bearstorm
  domain: automation
  name: (ZHA/Z2M) IKEA Somrig Controls
  description: "## Control anything with the IKEA Somrig remote control ⚠️ Compatible
    with both **Zigbee2MQTT** and **ZHA** \U0001F680 v1.2 ([MQTT](https://www.home-assistant.io/integrations/mqtt)
    ➕ [Z2M addon](https://www.zigbee2mqtt.io/guide/installation/03_ha_addon.html))
    ([ZHA](https://www.home-assistant.io/integrations/zha) ➕ [Zigbee Home Automation](https://www.home-assistant.io/integrations/zha/))\n\U0001F4D6
    The documentation for this blueprint is available [here](https://github.com/Bearstorm/HA_Blueprints/blob/main/Automations/Zigbee%20IKEA%20Somrig%20controller.md).\n\U0001F3D7️
    How to create and save Blueprints in Home Assistant can be found [here](https://www.bearstorm.com/blueprint-more-info.html).\n\U0001F4DC
    I was inspired by this [plan](https://gist.github.com/damru/b2c1c780ffb0ddc084952eb89db9573a).\n\U0001F552
    Updated by Bearstorm 2025.02.10\n✅ Now supports both **Zigbee2MQTT (Z2M)** and
    **ZHA**.\n✅ Automatically filters IKEA SOMRIG devices for both Zigbee integrations.\n\U0001F50C
    Available controls:\n- Press the **one dot** or **two dots** buttons\n- Double
    press the **one dot** or **two dots** buttons.\n- Press and hold the **one dot**
    or **two dots** buttons.\n- **Helper - Hold delay**, Delay between the execution
    of the Hold action(s).\n- **Helper - Max number of loops**, Maximum number of
    loops when holding down a button."
  input:
    remote_device:
      name: Select Remote
      description: Choose the IKEA Somrig (E2213) remote.
      selector:
        device:
          filter:
          - integration: mqtt
            manufacturer: IKEA
            model: SOMRIG shortcut button
          - integration: zha
            manufacturer: IKEA of Sweden
            model: SOMRIG shortcut button
          - integration: zha
            manufacturer: IKEA of Sweden
            model: E2213
          - integration: zha
            manufacturer: IKEA
            model: Shortcut Button
          - integration: zha
            manufacturer: IKEA
            model: SOMRIG-Button
          multiple: false
    dots_1_press_action:
      name: Dots 1 - Single press action
      description: Action when **one dot** button is pressed.
      default: []
      selector:
        action: {}
    dots_2_press_action:
      name: Dots 2 - Single press action
      description: Action when **two dots** button is pressed.
      default: []
      selector:
        action: {}
    dots_1_double_press_action:
      name: Dots 1 - Double press action
      description: Action when pressing the **one dot** button twice.
      default: []
      selector:
        action: {}
    dots_2_double_press_action:
      name: Dots 2 - Double press action
      description: Action when pressing the **two dots** button twice.
      default: []
      selector:
        action: {}
    dots_1_hold_action:
      name: Dots 1 - Hold action
      description: Action when **one dot** button is held.
      default: []
      selector:
        action: {}
    dots_2_hold_action:
      name: Dots 2 - Hold action
      description: Action when **two dots** button is held.
      default: []
      selector:
        action: {}
    helper_section:
      name: Helpers
      icon: mdi:cog-outline
      collapsed: true
      input:
        helper_hold_delay:
          name: Hold delay
          description: Delay between the execution of the **Hold** action(s).
          default: 250
          selector:
            number:
              unit_of_measurement: milliseconds
              min: 100.0
              max: 5000.0
              step: 10.0
              mode: slider
        helper_max_loops:
          name: Max number of loops
          description: Maximum number of loops when holding down a button.
          default: 20
          selector:
            number:
              min: 1.0
              max: 1000.0
              step: 1.0
              mode: slider
  source_url: https://blueprint-somrig-1-2.bearstorm.workers.dev/
mode: single
max_exceeded: silent
trigger:
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: short_release
    endpoint_id: 1
  id: press-dots-1-zha
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: short_release
    endpoint_id: 2
  id: press-dots-2-zha
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: multi_press_complete
    endpoint_id: 1
  id: double-press-dots-1-zha
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: multi_press_complete
    endpoint_id: 2
  id: double-press-dots-2-zha
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: long_press
    endpoint_id: 1
  id: hold-dots-1-zha
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: long_press
    endpoint_id: 2
  id: hold-dots-2-zha
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: long_release
    endpoint_id: 1
  id: release-dots-1-zha
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote_device
    command: long_release
    endpoint_id: 2
  id: release-dots-2-zha
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 1_short_release
  id: press-dots-1-z2m
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 2_short_release
  id: press-dots-2-z2m
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 1_double_press
  id: double-press-dots-1-z2m
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 2_double_press
  id: double-press-dots-2-z2m
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 1_long_press
  id: hold-dots-1-z2m
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 2_long_press
  id: hold-dots-2-z2m
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 1_long_release
  id: release-dots-1-z2m
- platform: device
  domain: mqtt
  device_id: !input remote_device
  type: action
  subtype: 2_long_release
  id: release-dots-2-z2m
action:
- choose:
  - conditions:
    - condition: template
      value_template: '{{ trigger.id in [''press-dots-1-z2m'', ''press-dots-1-zha'']
        }}'
    sequence:
    - wait_for_trigger:
      - platform: event
        event_type: zha_event
        event_data:
          command: multi_press_complete
          endpoint_id: 1
      - platform: device
        domain: mqtt
        device_id: !input remote_device
        type: action
        subtype: 1_double_press
      timeout: '0.3'
      continue_on_timeout: true
    - condition: template
      value_template: '{{ wait.trigger is none }}'
    - sequence: !input dots_1_press_action
  - conditions:
    - condition: template
      value_template: '{{ trigger.id in [''press-dots-2-z2m'', ''press-dots-2-zha'']
        }}'
    sequence:
    - wait_for_trigger:
      - platform: event
        event_type: zha_event
        event_data:
          command: multi_press_complete
          endpoint_id: 2
      - platform: device
        domain: mqtt
        device_id: !input remote_device
        type: action
        subtype: 2_double_press
      timeout: '0.3'
      continue_on_timeout: true
    - condition: template
      value_template: '{{ wait.trigger is none }}'
    - sequence: !input dots_2_press_action
  - conditions:
    - condition: template
      value_template: '{{ trigger.id in [''double-press-dots-1-z2m'', ''double-press-dots-1-zha'']
        }}'
    sequence: !input dots_1_double_press_action
  - conditions:
    - condition: template
      value_template: '{{ trigger.id in [''double-press-dots-2-z2m'', ''double-press-dots-2-zha'']
        }}'
    sequence: !input dots_2_double_press_action
  - conditions:
    - condition: template
      value_template: '{{ trigger.id in [''hold-dots-1-z2m'', ''hold-dots-1-zha'']
        }}'
    sequence:
    - repeat:
        count: !input helper_max_loops
        sequence:
        - parallel:
          - sequence: !input dots_1_hold_action
          - sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ trigger.id in [''release-dots-1-z2m'', ''release-dots-1-zha'']
                    }}'
                sequence:
                - stop: button released
  - conditions:
    - condition: template
      value_template: '{{ trigger.id in [''hold-dots-2-z2m'', ''hold-dots-2-zha'']
        }}'
    sequence:
    - repeat:
        count: !input helper_max_loops
        sequence:
        - parallel:
          - sequence: !input dots_2_hold_action
          - sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ trigger.id in [''release-dots-2-z2m'', ''release-dots-2-zha'']
                    }}'
                sequence:
                - stop: button released
