# NFS volume for media data from Synology NAS
volumes:
  nas-data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=${NAS_IP:-192.168.1.117},nfsvers=3,rw,hard,intr
      device: ":/volume2/Data"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
        # - JELLYFIN_PublishedServerUrl=http://192.168.0.5 #optional
    volumes:
      - ./jellyfin:/config
      - nas-data:/data:ro
    ports:
      - 8096:8096
      - 8920:8920 #optional
      - 7359:7359/udp #optional
      - 1900:1900/udp #optional
    networks:
      - app

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    volumes:
      - ./plex:/config
      - nas-data:/data:ro
    devices:
      - /dev/dri:/dev/dri
    environment:
      - VERSION=docker
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    network_mode: host

  yt-dl:
    image: nbr23/youtube-dl-server:latest
    restart: unless-stopped
    container_name: yt-dl
    volumes:
      - ./yt-dl:/youtube-dl
    networks:
      - app


  tautulli:
    image: ghcr.io/tautulli/tautulli
    container_name: tautulli
    restart: unless-stopped
    volumes:
      - ./tautulli:/config
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    networks:
      - app

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - 13378:80
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - nas-data:/data:ro
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    volumes:
      - ./prowlarr:/config
    networks:
      - app

  # https://trash-guides.info/File-and-Folder-Structure/How-to-set-up/Docker/
  radarr:
    container_name: radarr
    image: linuxserver/radarr:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    volumes:
      - ./radarr:/config
      - nas-data:/data
    networks:
      - app

  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    volumes:
      - ./sonarr:/config
      - nas-data:/data
    networks:
      - app

  lidarr:
    container_name: lidarr
    image: linuxserver/lidarr:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    volumes:
      - ./lidarr:/config
      - nas-data:/data
    networks:
      - app

  bazarr:
    container_name: bazarr
    image: linuxserver/bazarr:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    volumes:
      - ./bazarr:/config
      - nas-data:/data:ro
    networks:
      - app

  tailscale-gateway:
    image: tailscale/tailscale:latest
    hostname: docker-gateway
    container_name: tailscale-gateway
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY?err}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=true
      - TS_EXTRA_ARGS=--exit-node=100.123.96.89 --exit-node-allow-lan-access=false --reset
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    # network_mode: service:tailscale-gateway
    networks:
      - app
    depends_on:
      - tailscale-gateway
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
      - WEBUI_PORT=8081
    volumes:
      - ./qbittorrent:/config
      - nas-data:/data
    deploy:
      resources:
        limits:
          memory: 1000M # limit RAM usage for caching

  sabnzbd:
    container_name: sabnzbd
    image: linuxserver/sabnzbd:latest
    restart: unless-stopped
    # network_mode: service:tailscale-gateway
    depends_on:
      - tailscale-gateway
    networks:
      - app
    environment:
      - PUID=${PUID?err}
      - PGID=${PGID?err}
      - TZ=${TZ?err}
    volumes:
      - ./sabnzbd:/config
      - nas-data:/data
